<div class="page-container">
  <div class="page-header">
    <div class="header-content">
      <h1>
        <mat-icon>business</mat-icon>
        {{ 'Departamentos.PageTitle' | translate }}
      </h1>
      <p class="subtitle">{{ 'Departamentos.PageSubtitle' | translate }}</p>
    </div>
    <button mat-raised-button color="primary" (click)="openCreateDialog()" class="create-button">
      <mat-icon>add</mat-icon>
      {{ 'Departamentos.NewButton' | translate }}
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <app-data-table
        [columns]="columns"
        [data]="tableData"
        [isLoading]="loading"
        [serverSide]="false"
        (actionClick)="onActionClick($event)"
      />
    </mat-card-content>
  </mat-card>
</div>
