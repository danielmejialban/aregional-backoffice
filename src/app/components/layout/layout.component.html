<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    class="sidenav"
    [class.collapsed]="sidenavCollapsed && !isMobile"
    [mode]="isMobile ? 'over' : 'side'"
    [(opened)]="sidenavOpen">

    <div class="sidenav-header">
      <span class="sidenav-title" *ngIf="!sidenavCollapsed || isMobile">{{ 'Layout.AppName' | translate }}</span>
      <mat-icon class="sidenav-logo-icon" *ngIf="sidenavCollapsed && !isMobile">stars</mat-icon>
    </div>

    <mat-nav-list>
      <a mat-list-item
         *ngFor="let item of menuItems"
         [routerLink]="item.route"
         routerLinkActive="active"
         [hidden]="!hasAccess(item.roles)"
         (click)="onNavItemClick()"
         [matTooltip]="item.label | translate"
         [matTooltipDisabled]="!sidenavCollapsed || isMobile"
         matTooltipPosition="right">
        <mat-icon matListItemIcon>{{item.icon}}</mat-icon>
        <span matListItemTitle *ngIf="!sidenavCollapsed || isMobile">{{ item.label | translate }}</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="toolbar">
      <button mat-icon-button (click)="toggleSidenav()" [attr.aria-label]="'Layout.ToggleMenu' | translate">
        <mat-icon>{{ sidenavCollapsed && !isMobile ? 'menu_open' : 'menu' }}</mat-icon>
      </button>

      <span class="toolbar-title" *ngIf="isMobile">{{ 'Layout.AppName' | translate }}</span>

      <span class="toolbar-spacer"></span>

      <button mat-icon-button
              (click)="themeService.toggleDarkMode()"
              [matTooltip]="(themeService.isDark() ? 'Layout.LightMode' : 'Layout.DarkMode') | translate">
        <mat-icon>{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>

      <button mat-button [matMenuTriggerFor]="userMenu" *ngIf="currentUser$ | async as user" class="user-button">
        <mat-icon>account_circle</mat-icon>
        <span class="user-name-text">{{user.nombreUsuario}} ({{user.rol}})</span>
      </button>

      <mat-menu #userMenu="matMenu">
        <button mat-menu-item (click)="logout()">
          <mat-icon>exit_to_app</mat-icon>
          <span>{{ 'Layout.Logout' | translate }}</span>
        </button>
      </mat-menu>
    </mat-toolbar>

    <div class="content">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
