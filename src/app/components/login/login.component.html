<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Asamblea Regional</mat-card-title>
      <mat-card-subtitle>Sistema de Gestión de Voluntarios</mat-card-subtitle>
    </mat-card-header>
    
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>DNI</mat-label>
          <input matInput formControlName="dni" placeholder="12345678A" autocomplete="username">
          <mat-icon matPrefix>person</mat-icon>
          <mat-error *ngIf="loginForm.get('dni')?.hasError('required')">
            El DNI es obligatorio
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput 
                 [type]="hidePassword ? 'password' : 'text'" 
                 formControlName="contrasena"
                 autocomplete="current-password">
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix (click)="hidePassword = !hidePassword" type="button">
            <mat-icon>{{hidePassword ? 'visibility_off' : 'visibility'}}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('contrasena')?.hasError('required')">
            La contraseña es obligatoria
          </mat-error>
        </mat-form-field>

        <button mat-raised-button 
                color="primary" 
                type="submit" 
                class="full-width login-button"
                [disabled]="loading || loginForm.invalid">
          <span *ngIf="!loading">Iniciar Sesión</span>
          <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        </button>
      </form>

      <div class="credentials-info">
        <p><strong>Credenciales de prueba:</strong></p>
        <ul>
          <li>Admin: <code>12345678A</code> / <code>admin123</code></li>
          <li>Coordinador: <code>87654321B</code> / <code>admin123</code></li>
          <li>Voluntario: <code>11111111C</code> / <code>admin123</code></li>
          <li>Check-In: <code>22222222D</code> / <code>admin123</code></li>
        </ul>
      </div>
    </mat-card-content>
  </mat-card>
</div>
