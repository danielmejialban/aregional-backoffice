<div class="page-container">

  <div class="page-header">
    <h1><mat-icon class="header-icon">event</mat-icon> Eventos</h1>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> Nuevo Evento
    </button>
  </div>

  <mat-card>
    <mat-card-content>
      <app-data-table
        [columns]="columns"
        [data]="eventos"
        [isLoading]="loading"
        [serverSide]="false"
        (actionClick)="onActionClick($event)"
      />
    </mat-card-content>
  </mat-card>
</div>
