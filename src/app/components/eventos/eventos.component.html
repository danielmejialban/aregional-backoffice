<div class="page-container">

  <!-- Header -->
  <div class="page-header">
    <h1><mat-icon class="header-icon">event</mat-icon> Eventos</h1>
    <button mat-raised-button color="primary" (click)="openCreateDialog()">
      <mat-icon>add</mat-icon> Nuevo Evento
    </button>
  </div>

  <mat-card>
    <mat-card-content>

      <!-- Loading -->
      <div *ngIf="loading" class="loading-container">
        <mat-spinner diameter="48"></mat-spinner>
      </div>

      <!-- Tabla -->
      <table mat-table [dataSource]="eventos" *ngIf="!loading" class="full-width-table">

        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let e">{{ e.id }}</td>
        </ng-container>

        <!-- Nombre -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let e">
            <strong>{{ e.nombre }}</strong>
            <span class="sesion-badge" *ngIf="e.sesion">{{ e.sesion }}</span>
          </td>
        </ng-container>

        <!-- Tipo -->
        <ng-container matColumnDef="tipo">
          <th mat-header-cell *matHeaderCellDef>Tipo</th>
          <td mat-cell *matCellDef="let e">
            <mat-chip *ngIf="e.tipoEvento">{{ e.tipoEvento }}</mat-chip>
            <span *ngIf="!e.tipoEvento" class="empty-cell">—</span>
          </td>
        </ng-container>

        <!-- Fechas evento -->
        <ng-container matColumnDef="fechas">
          <th mat-header-cell *matHeaderCellDef>Fechas del evento</th>
          <td mat-cell *matCellDef="let e">
            <div class="fecha-row">
              <mat-icon class="fecha-icon">play_arrow</mat-icon>
              {{ e.fechaInicioEvento | date:'dd/MM/yyyy HH:mm' }}
            </div>
            <div class="fecha-row">
              <mat-icon class="fecha-icon">stop</mat-icon>
              {{ e.fechaFinEvento | date:'dd/MM/yyyy HH:mm' }}
            </div>
          </td>
        </ng-container>

        <!-- Dirección -->
        <ng-container matColumnDef="direccion">
          <th mat-header-cell *matHeaderCellDef>Dirección</th>
          <td mat-cell *matCellDef="let e">
            <span [matTooltip]="e.direccion || ''" class="direccion-cell">
              {{ e.direccion || '—' }}
            </span>
          </td>
        </ng-container>

        <!-- Acciones -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let e">
            <button mat-icon-button color="primary" matTooltip="Editar" (click)="openEditDialog(e)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="deleteEvento(e)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

        <!-- Empty state -->
        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell empty-row" [attr.colspan]="displayedColumns.length">
            No hay eventos registrados
          </td>
        </tr>
      </table>

    </mat-card-content>
  </mat-card>
</div>
