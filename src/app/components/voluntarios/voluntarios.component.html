<div class="page-container">
  <div class="page-header">
    <h1>Voluntarios</h1>
    <div class="header-actions">
      <input #fileInput type="file" accept=".csv,.xlsx,.xls" style="display:none"
             (change)="onArchivoSeleccionado($event)">

      <button mat-stroked-button color="primary"
              (click)="descargarPlantillaMaestra()"
              matTooltip="Descarga la plantilla Excel maestra">
        <mat-icon>table_view</mat-icon> Plantilla Maestra .xlsx
      </button>

      <button mat-stroked-button
              (click)="descargarPlantillaCsv()"
              matTooltip="Plantilla CSV sencilla">
        <mat-icon>download</mat-icon> Plantilla CSV
      </button>

      <button mat-stroked-button color="accent"
              [disabled]="subiendoArchivo"
              (click)="abrirSelectorArchivo()"
              matTooltip="Sube un CSV o Excel con la plantilla descargada">
        <mat-icon>upload_file</mat-icon>
        {{ subiendoArchivo ? 'Subiendo...' : 'Carga masiva CSV/Excel' }}
      </button>

      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>add</mat-icon> Nuevo Voluntario
      </button>
    </div>
  </div>

  <mat-card>
    <mat-card-content>
      <app-data-table
        [columns]="columns"
        [data]="voluntarios"
        [isLoading]="loading || subiendoArchivo"
        [serverSide]="true"
        [totalItems]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="currentPage"
        [pageSizeOptions]="[10, 25, 50]"
        [showColumnToggle]="true"
        [showExportButton]="true"
        exportFileName="voluntarios"
        (filterChange)="onFilterChange($event)"
        (pageChange)="onPageChange($event)"
        (actionClick)="onActionClick($event)"
      />
    </mat-card-content>
  </mat-card>
</div>
