<div class="page-container">

  <div class="page-header">
    <h1><mat-icon class="header-icon">assignment_ind</mat-icon> {{ 'EventoVoluntarios.PageTitle' | translate }}</h1>
    <div class="header-actions">
      <button mat-stroked-button color="primary" (click)="openAsignacionMasivaDialog()">
        <mat-icon>group_add</mat-icon> {{ 'EventoVoluntarios.Buttons.AsignacionMasiva' | translate }}
      </button>
      <button mat-stroked-button color="accent"
              [matTooltip]="'EventoVoluntarios.Tooltips.DescargarPdf' | translate"
              (click)="descargarPdfGlobal()">
        <mat-icon>picture_as_pdf</mat-icon> {{ 'EventoVoluntarios.Buttons.DescargarPdf' | translate }}
      </button>
      <button mat-raised-button color="primary" (click)="openCreateDialog()">
        <mat-icon>person_add</mat-icon> {{ 'EventoVoluntarios.Buttons.NuevaAsignacion' | translate }}
      </button>
    </div>
  </div>

  <!-- Template para la celda QR personalizada -->
  <ng-template #qrCellTpl let-row>
    <div class="qr-status-cell">
      @if (row.qrImageBase64) {
        <mat-chip class="qr-chip" (click)="verQr(row)" style="cursor:pointer">
          <mat-icon>qr_code_2</mat-icon>&nbsp;{{ 'EventoVoluntarios.Badges.Generado' | translate }}
        </mat-chip>
      } @else {
        <button mat-stroked-button color="primary" class="gen-qr-btn"
                [disabled]="generandoQrIds.has(row.id)"
                [matTooltip]="'EventoVoluntarios.Tooltips.GenerarQr' | translate"
                (click)="generarQr(row)">
          @if (generandoQrIds.has(row.id)) {
            <mat-spinner diameter="16" />
          } @else {
            <mat-icon>qr_code</mat-icon>
          }
          {{ (generandoQrIds.has(row.id) ? 'EventoVoluntarios.Buttons.Generando' : 'EventoVoluntarios.Buttons.GenerarQr') | translate }}
        </button>
      }
    </div>
  </ng-template>

  <mat-card>
    <mat-card-content>
      <app-data-table
        [columns]="columns"
        [data]="asignaciones"
        [isLoading]="loading"
        [serverSide]="true"
        [totalItems]="totalElements"
        [pageSize]="pageSize"
        [pageIndex]="currentPage"
        [pageSizeOptions]="[10, 25, 50]"
        (filterChange)="onFilterChange($event)"
        (pageChange)="onPageChange($event)"
        (actionClick)="onActionClick($event)"
      />
    </mat-card-content>
  </mat-card>
</div>
