<div class="page-container">
  <div class="page-header">
    <h1><mat-icon>bar_chart</mat-icon> Estadísticas</h1>
  </div>

  <div *ngIf="loading" class="loading-container">
    <mat-spinner></mat-spinner>
  </div>

  <ng-container *ngIf="!loading">
    <!-- Summary cards -->
    <div class="stats-grid">
      <mat-card class="stat-card">
        <mat-card-content>
          <mat-icon class="stat-icon volunteers">people</mat-icon>
          <div class="stat-info">
            <span class="stat-value">{{ totalVoluntarios }}</span>
            <span class="stat-label">Voluntarios</span>
          </div>
        </mat-card-content>
      </mat-card>

      <mat-card class="stat-card">
        <mat-card-content>
          <mat-icon class="stat-icon events">event</mat-icon>
          <div class="stat-info">
            <span class="stat-value">{{ totalEventos }}</span>
            <span class="stat-label">Eventos</span>
          </div>
        </mat-card-content>
      </mat-card>

      <mat-card class="stat-card">
        <mat-card-content>
          <mat-icon class="stat-icon checkins">qr_code_scanner</mat-icon>
          <div class="stat-info">
            <span class="stat-value">{{ totalCheckIns }}</span>
            <span class="stat-label">Check-Ins</span>
          </div>
        </mat-card-content>
      </mat-card>

      <mat-card class="stat-card">
        <mat-card-content>
          <mat-icon class="stat-icon departments">business</mat-icon>
          <div class="stat-info">
            <span class="stat-value">{{ totalDepartamentos }}</span>
            <span class="stat-label">Departamentos</span>
          </div>
        </mat-card-content>
      </mat-card>
    </div>

    <!-- Charts row 1 -->
    <div class="charts-row">
      <mat-card class="chart-card wide">
        <mat-card-content>
          <canvas baseChart
            [data]="barChartData"
            [options]="barChartOptions"
            type="bar">
          </canvas>
        </mat-card-content>
      </mat-card>

      <mat-card class="chart-card">
        <mat-card-content>
          <canvas baseChart
            [data]="doughnutChartData"
            [options]="doughnutChartOptions"
            type="doughnut">
          </canvas>
        </mat-card-content>
      </mat-card>
    </div>

    <!-- Charts row 2 -->
    <div class="charts-row">
      <mat-card class="chart-card full">
        <mat-card-content>
          <canvas baseChart
            [data]="lineChartData"
            [options]="lineChartOptions"
            type="line">
          </canvas>
        </mat-card-content>
      </mat-card>
    </div>
  </ng-container>
</div>
